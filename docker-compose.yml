services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: panel_db
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel -d panel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: