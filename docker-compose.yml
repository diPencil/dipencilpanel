services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Inside the app container, `localhost` is not Postgres — use the compose service name `db`.
    # This overrides DATABASE_URL from .env so Docker deployments work with the bundled database.
    environment:
      DATABASE_URL: postgresql://panel:panel_password@db:5432/panel_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: panel_db
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel -d panel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: