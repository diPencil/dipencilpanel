services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://panel:panel_password@db:5432/panel_db
      AUTH_SECRET: change-this-secret
      NEXT_PUBLIC_APP_URL: https://panel.dipencil.com
      SMTP_HOST: smtp.hostinger.com
      SMTP_PORT: 465
      SMTP_USER: noreply@example.com
      SMTP_PASS: ""
      SMTP_FROM: noreply@example.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: panel_db
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel -d panel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: